<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚌 창의나라 유치원 승하차 자동 알리미</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root{
  --or:#FF6B35;--ye:#FFD166;--gr:#06D6A0;--bl:#118AB2;
  --dark:#0d1b2a;--card:#1a2d3e;--card2:#1e3448;--txt:#f0f4f8;--r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:var(--txt);min-height:100vh;padding-bottom:100px;overflow-x:hidden;}

header{background:linear-gradient(135deg,#FF6B35,#e8541f);padding:20px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.3);}
header h1{font-weight:900;font-size:1.3rem;}

.container{max-width:500px;margin:0 auto;padding:12px;}

.info-card{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:12px;border-left:5px solid var(--ye);box-shadow:0 10px 20px rgba(0,0,0,0.2);}
.info-row{display:flex;justify-content:space-between;align-items:center;}
.day-badge{background:var(--bl);padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:700;}

.btn-main{background:var(--or);color:white;border:none;padding:12px 20px;border-radius:50px;font-weight:900;font-size:1rem;cursor:pointer; transition: all 0.2s; box-shadow: 0 4px 10px rgba(255,107,53,0.3);}
.btn-main.active{background:#ef4444; box-shadow: 0 4px 10px rgba(239,68,68,0.3);}
.btn-sub{background:#334155; color:white; border:none; padding:12px; border-radius:8px; font-weight:700; width:100%; cursor:pointer;}

.toggle-btn{background:var(--card2); color:var(--ye); border:1px solid var(--ye); padding:10px; border-radius:8px; width:100%; margin:10px 0; font-weight:700; cursor:pointer; display:flex; justify-content: space-between; align-items: center;}

.stop-card{background:var(--card2);border-radius:var(--r);padding:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.05);position:relative; transition: all 0.3s;}
.stop-card.active{border:3px solid var(--gr);background:rgba(6, 214, 160, 0.15); box-shadow: 0 0 15px rgba(6, 214, 160, 0.3);}
.stop-card.disabled{opacity: 0.6; border-style: dashed;}
.stop-name{font-weight:900;font-size:1.1rem;color:var(--ye);margin-bottom:6px; padding-right: 90px;}
.child-list{font-size:0.9rem;color:#cbd5e1;line-height:1.4; min-height: 1.4em;}
.custom-msg-display { font-size: 0.85rem; color: var(--gr); margin-top: 6px; font-weight: 500; background: rgba(6, 214, 160, 0.1); padding: 4px 8px; border-radius: 4px; display: inline-block; }

.speaker-controls { position: absolute; right: 12px; top: 12px; display: flex; gap: 8px; z-index: 5; }
.btn-action-icon { background: rgba(255,255,255,0.1); border: none; width: 38px; height: 38px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
.btn-action-icon.off { color: #64748b; }
.btn-action-icon.stop { color: #ef4444; font-size: 0.9rem; }

.edit-item {background:var(--card2); padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid #334155;}
.edit-item label{display:block; font-size:0.75rem; color:var(--ye); margin-bottom:4px; margin-top:8px; font-weight:bold;}
.edit-item input[type="text"], .edit-item input[type="number"], .edit-item textarea{width:100%; background:#0d1b2a; border:1px solid #475569; color:white; padding:10px; border-radius:8px; font-size:0.85rem;}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.switch { position: relative; display: inline-block; width: 42px; height: 20px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .4s; border-radius: 20px; }
.slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
input:checked + .slider { background-color: var(--gr); }
input:checked + .slider:before { transform: translateX(22px); }

.btn-save-sm{background:var(--gr); color:#0d1b2a; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer; width: 100%; margin-top: 15px; font-size: 0.9rem;}

nav{position:fixed;bottom:0;width:100%;max-width:500px;left:50%;transform:translateX(-50%);background:var(--card);display:flex;border-top:1px solid rgba(255,255,255,0.1);z-index:100;}
nav button{flex:1;background:none;border:none;padding:15px;color:rgba(255,255,255,0.5);font-weight:700;font-size:0.9rem;}
nav button.active{color:var(--ye);}

.input-group{margin-bottom:15px;}
.input-group label{display:block;font-size:0.8rem;color:var(--ye);margin-bottom:5px;}
.input-group input, .input-group textarea{width:100%;background:#0d1b2a;border:1px solid #334155;padding:10px;border-radius:8px;color:white;}

h2.section-title {font-size:1.1rem; color:var(--ye); margin:20px 0 10px 0; border-left:4px solid var(--or); padding-left:10px;}
.upload-section{background:var(--card2); border:2px dashed var(--bl); border-radius:var(--r); padding:20px; text-align:center; margin-bottom:12px; cursor:pointer;}
.btn-download { background: #1e3448; color: var(--bl); border: 1px solid var(--bl); padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
</style>
</head>
<body>

<header><h1>🚌 창의나라 유치원 승하차 자동 알리미</h1></header>

<div class="container" id="main-view">
    <div class="info-card">
        <div class="info-row">
            <div>
                <div id="disp-day" class="day-badge">-요일</div>
                <div id="disp-mode" style="margin-top:5px; font-weight:700; color:var(--ye);">데이터 로딩 중...</div>
            </div>
            <button id="track-btn" class="btn-main">운행 시작</button>
        </div>
        <div id="gps-status" style="margin-top:10px; font-size:0.75rem; color:rgba(255,255,255,0.5);">GPS 대기 중...</div>
    </div>

    <div id="active-station-display"></div>

    <button class="toggle-btn" id="list-toggle-btn">
        <span>📍 전체 정류장 목록</span>
        <span id="list-toggle-icon">▼</span>
    </button>
    
    <div id="station-list" style="display:none;"></div>
    <div id="status-message" style="text-align:center; padding:20px; color:#94a3b8; font-size:0.9rem;">CSV를 먼저 업로드하고 운행을 시작하세요.</div>
</div>

<div class="container" id="config-view" style="display:none;">
    <h2 class="section-title">📁 데이터 관리 및 백업</h2>
    <div class="upload-section" id="upload-box">
        <span style="font-size:1.1rem; font-weight:bold;">새 CSV 파일 업로드</span>
        <input type="file" id="csv-file" accept=".csv" style="display:none">
    </div>
    <button class="btn-download" id="download-csv-btn">📥 현재 전체 데이터 CSV 다운로드 (백업)</button>

    <h2 class="section-title">📢 공통 기본 설정</h2>
    <div style="background:var(--card); padding:15px; border-radius:12px; margin-bottom:20px;">
        <div class="input-group">
            <label>🗣️ 기본 안내 문구 ( [정류장] 부분이 자동 치환됩니다 )</label>
            <textarea id="cfg-announce-text" style="height:60px;"></textarea>
        </div>
        <div class="grid-2">
            <div class="input-group">
                <label>📍 인식 반경 (m)</label>
                <input type="number" id="cfg-radius">
            </div>
            <div class="input-group">
                <label>⏱️ 재안내 제한 (분)</label>
                <input type="number" id="cfg-wait-time">
            </div>
        </div>
        <button id="save-global-btn" class="btn-main" style="width:100%; border-radius:10px;">전체 설정 저장</button>
        <button id="reset-data-btn" class="btn-sub" style="background:#450a0a; color:#f87171; border:1px solid #991b1b; margin-top:15px;">⚠️ 모든 데이터 초기화</button>
    </div>

    <h2 class="section-title">📍 정류장별 상세 관리</h2>
    <div id="admin-station-list"></div>
</div>

<nav>
    <button id="tab-btn-main" class="active">🏠 운행</button>
    <button id="tab-btn-config">⚙️ 관리</button>
</nav>

<script>
let stations = [];
let config = { radius: 80, announceText: "이번 정류장은 [정류장]입니다.", waitTime: 25 };
let isTracking = false;
let watchId = null;
let announcedLog = {};
let isSpeakingGlobal = false;
let announcementTimeout = null;

const synth = window.speechSynthesis;
const DB_KEY = 'bus_helper_data_v1';
const CFG_KEY = 'bus_helper_config_v1';

function init() {
    const saved = localStorage.getItem(DB_KEY);
    if(saved) stations = JSON.parse(saved);
    const savedCfg = localStorage.getItem(CFG_KEY);
    if(savedCfg) config = {...config, ...JSON.parse(savedCfg)};

    document.getElementById('cfg-radius').value = config.radius;
    document.getElementById('cfg-announce-text').value = config.announceText;
    document.getElementById('cfg-wait-time').value = config.waitTime;

    document.getElementById('save-global-btn').onclick = saveGlobalConfig;
    document.getElementById('reset-data-btn').onclick = clearAllData;
    document.getElementById('track-btn').onclick = toggleTracking;
    document.getElementById('list-toggle-btn').onclick = toggleList;
    document.getElementById('tab-btn-main').onclick = () => showTab('main');
    document.getElementById('tab-btn-config').onclick = () => showTab('config');
    document.getElementById('download-csv-btn').onclick = downloadCSV;
    
    document.getElementById('upload-box').onclick = () => document.getElementById('csv-file').click();
    document.getElementById('csv-file').onchange = handleFile;

    updateInfo();
    renderMain();
}

function cleanText(val) { return val ? String(val).trim().replace(/^"|"$/g, '').replace(/""/g, '"') : ""; }

function getChildList(station) {
    if (!station) return "";
    const now = new Date();
    const hour = now.getHours();
    const day = now.getDay(); 
    if(day === 0 || day === 6) return "주말 운행 없음";
    return cleanText((hour < 12) ? station.morning : [null, station.mon, station.tue, station.wed, station.thu, station.fri, null][day]);
}

// CSV 업로드 핸들러 (백업된 파일의 개별 멘트까지 불러오도록 보강)
function handleFile(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/);
        const newRows = [];
        for(let i = 1; i < lines.length; i++) {
            let line = lines[i].trim();
            if(!line) continue;
            const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const sName = cleanText(cols[0]);
            if(sName && !isNaN(parseFloat(cols[1]))) {
                newRows.push({
                    name: sName, lat: parseFloat(cols[1]), lng: parseFloat(cols[2]),
                    morning: cleanText(cols[3]), mon: cleanText(cols[4]), tue: cleanText(cols[5]), 
                    wed: cleanText(cols[6]), thu: cleanText(cols[7]), fri: cleanText(cols[8]),
                    customAnnounce: cleanText(cols[9]) || "", // 백업 파일의 10번째 열(개별 멘트) 로드
                    useAnnounce: true, useCustom: true
                });
            }
        }
        if(newRows.length > 0) {
            stations = newRows;
            localStorage.setItem(DB_KEY, JSON.stringify(stations));
            renderMain();
            alert(stations.length + "개 정류장 데이터가 성공적으로 적용되었습니다.");
            showTab('main');
        }
    };
    reader.readAsText(file, "EUC-KR");
}

// ⭐ CSV 다운로드 (백업) 기능
function downloadCSV() {
    if (stations.length === 0) return alert("다운로드할 데이터가 없습니다.");
    
    // 엑셀에서 한글 깨짐 방지를 위한 BOM 추가
    let csvContent = "\uFEFF"; 
    // 헤더 정의
    csvContent += "정류장명,위도,경도,오전,월,화,수,목,금,개별추가멘트\n";
    
    stations.forEach(s => {
        const row = [
            s.name, s.lat, s.lng, s.morning, s.mon, s.tue, s.wed, s.thu, s.fri, s.customAnnounce
        ].map(v => `"${(v || "").toString().replace(/"/g, '""')}"`).join(",");
        csvContent += row + "\n";
    });
    
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    link.href = URL.createObjectURL(blob);
    link.setAttribute("download", `창의나라_데이터_백업_${dateStr}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function saveGlobalConfig() {
    config.radius = parseInt(document.getElementById('cfg-radius').value);
    config.announceText = document.getElementById('cfg-announce-text').value;
    config.waitTime = parseInt(document.getElementById('cfg-wait-time').value);
    localStorage.setItem(CFG_KEY, JSON.stringify(config));
    alert("설정 저장 완료");
}

function clearAllData() {
    if(confirm("모든 데이터를 초기화하시겠습니까? 업로드한 정류장 정보가 모두 삭제됩니다.")) {
        localStorage.removeItem(DB_KEY);
        stations = [];
        location.reload();
    }
}

function renderMain() {
    const list = document.getElementById('station-list');
    const msg = document.getElementById('status-message');
    if(!list) return;
    list.innerHTML = '';
    if(stations.length === 0) { msg.style.display = 'block'; return; }
    msg.style.display = 'none';

    stations.forEach((s, i) => {
        const names = getChildList(s);
        const card = document.createElement('div');
        card.className = `stop-card ${s.useAnnounce ? '' : 'disabled'}`;
        card.id = `card-${i}`;
        card.innerHTML = `
            <div class="stop-name">${s.useAnnounce ? '' : '🔇 '}${s.name}</div>
            <div class="child-list">${names || '명단 없음'}</div>
            ${(s.customAnnounce && s.useCustom) ? `<div class="custom-msg-display">📢 ${s.customAnnounce}</div>` : ''}
            <div class="speaker-controls">
                <button onclick="stopSpeak()" class="btn-action-icon stop">⬛</button>
                <button onclick="manualSpeak(${i})" class="btn-action-icon ${s.useAnnounce ? '' : 'off'}">🔊</button>
            </div>
        `;
        list.appendChild(card);
    });
}

function renderAdminList() {
    const list = document.getElementById('admin-station-list');
    list.innerHTML = '';
    stations.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'edit-item';
        item.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                <label style="font-size:1rem;">📍 ${s.name}</label>
                <label class="switch"><input type="checkbox" id="edit-use-${i}" ${s.useAnnounce?'checked':''}> <span class="slider"></span></label>
            </div>
            <label>🗣️ 이 정류장 전용 추가 멘트</label>
            <textarea id="edit-custom-${i}" placeholder="정류장 도착 시 공통 문구 뒤에 추가로 읽어줄 내용을 입력하세요.">${s.customAnnounce || ''}</textarea>
            <button class="btn-save-sm" onclick="saveIndividual(${i})">정류장 설정 저장</button>
        `;
        list.appendChild(item);
    });
}

function saveIndividual(i) {
    stations[i].customAnnounce = document.getElementById(`edit-custom-${i}`).value.trim();
    stations[i].useAnnounce = document.getElementById(`edit-use-${i}`).checked;
    localStorage.setItem(DB_KEY, JSON.stringify(stations));
    alert("해당 정류장 정보가 저장되었습니다.");
    renderMain();
}

function stopSpeak() { 
    synth.cancel(); 
    isSpeakingGlobal = false; 
    if(announcementTimeout) { clearTimeout(announcementTimeout); announcementTimeout = null; }
}

function speak(idx, isAuto = false) {
    const s = stations[idx];
    if (isAuto) {
        if (!s.useAnnounce) return;
        const now = Date.now();
        if (now - (announcedLog[s.name] || 0) < config.waitTime * 60000) return;
        announcedLog[s.name] = now;
    }
    
    stopSpeak();

    let text = config.announceText.replace(/\[정류장\]/g, s.name);
    const names = getChildList(s);
    if(names) text += ` 명단은 ${names}입니다. `;
    if(s.customAnnounce && s.useCustom !== false) text += ` ${s.customAnnounce}`;

    const play = () => {
        const ut = new SpeechSynthesisUtterance(text);
        ut.lang = 'ko-KR';
        ut.onstart = () => { isSpeakingGlobal = true; };
        ut.onend = () => { if(!announcementTimeout) isSpeakingGlobal = false; };
        synth.speak(ut);
    };

    play();

    announcementTimeout = setTimeout(() => {
        announcementTimeout = null;
        play();
        setTimeout(() => { isSpeakingGlobal = false; }, 5000);
    }, 6000);
}

function manualSpeak(i) { highlight(i); speak(i, false); }

function highlight(idx) {
    const s = stations[idx];
    const display = document.getElementById('active-station-display');
    display.innerHTML = `
        <div class="stop-card active" style="border-width:4px;">
            <div style="font-size:0.8rem; color:var(--gr); font-weight:bold;">현재 도착 안내 중</div>
            <div class="stop-name" style="font-size:1.4rem;">${s.name}</div>
            <div class="child-list" style="font-size:1.1rem; color:white;">${getChildList(s) || '명단 없음'}</div>
        </div>
    `;
    document.querySelectorAll('.stop-card').forEach(c => c.classList.remove('active'));
    const target = document.getElementById(`card-${idx}`);
    if(target) target.classList.add('active');
}

function toggleTracking() {
    const btn = document.getElementById('track-btn');
    const gpsStatus = document.getElementById('gps-status');

    if(!isTracking) {
        if(stations.length === 0) return alert("데이터를 먼저 업로드하세요.");
        isTracking = true;
        btn.innerText = "운행 중지"; btn.classList.add('active');
        
        gpsStatus.innerText = "📡 GPS 신호 연결 시도 중...";
        gpsStatus.style.color = "var(--ye)";

        watchId = navigator.geolocation.watchPosition(pos => {
            const {latitude: lat, longitude: lng, accuracy} = pos.coords;
            gpsStatus.innerText = `📡 GPS 수신 중 (정확도: ${Math.round(accuracy)}m)`;
            gpsStatus.style.color = "var(--gr)";

            stations.forEach((s, i) => {
                const dist = getDist(lat, lng, s.lat, s.lng);
                if(dist < config.radius) {
                    highlight(i);
                    if(!isSpeakingGlobal) speak(i, true);
                }
            });
        }, (err) => {
            gpsStatus.innerText = "❌ GPS 수신 불가 (위치 권한 확인 필요)";
            gpsStatus.style.color = "#ef4444";
        }, { enableHighAccuracy: true, maximumAge: 0 });
    } else {
        isTracking = false;
        btn.innerText = "운행 시작"; btn.classList.remove('active');
        gpsStatus.innerText = "GPS 대기 중...";
        gpsStatus.style.color = "rgba(255,255,255,0.5)";
        navigator.geolocation.clearWatch(watchId);
        stopSpeak();
    }
}

function getDist(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function toggleList() {
    const list = document.getElementById('station-list');
    const icon = document.getElementById('list-toggle-icon');
    const isVisible = list.style.display === 'block';
    list.style.display = isVisible ? 'none' : 'block';
    icon.innerText = isVisible ? '▼' : '▲';
}

function showTab(tab) {
    document.getElementById('main-view').style.display = tab === 'main' ? 'block' : 'none';
    document.getElementById('config-view').style.display = tab === 'config' ? 'block' : 'none';
    document.getElementById('tab-btn-main').className = tab === 'main' ? 'active' : '';
    document.getElementById('tab-btn-config').className = tab === 'config' ? 'active' : '';
    if(tab === 'config') renderAdminList();
}

function updateInfo() {
    const days = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
    const now = new Date();
    document.getElementById('disp-day').innerText = days[now.getDay()];
    document.getElementById('disp-mode').innerText = now.getHours() < 12 ? "☀️ 오전 등원 명단" : "🌙 오후 하차 명단";
}

window.onload = init;
</script>
</body>
</html>
