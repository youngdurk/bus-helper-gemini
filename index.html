<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚌 유치원 통학버스 도우미</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root{
  --or:#FF6B35;--ye:#FFD166;--gr:#06D6A0;--bl:#118AB2;
  --dark:#0d1b2a;--card:#1a2d3e;--card2:#1e3448;--txt:#f0f4f8;--r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:var(--txt);min-height:100vh;padding-bottom:80px;overflow-x:hidden;}

header{background:linear-gradient(135deg,#FF6B35,#e8541f);padding:20px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.3);}
header h1{font-weight:900;font-size:1.3rem;}

.container{max-width:500px;margin:0 auto;padding:12px;}

.info-card{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:12px;border-left:5px solid var(--ye);box-shadow:0 10px 20px rgba(0,0,0,0.2);}
.info-row{display:flex;justify-content:space-between;align-items:center;}
.day-badge{background:var(--bl);padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:700;}

.btn-main{background:var(--or);color:white;border:none;padding:12px 20px;border-radius:50px;font-weight:900;font-size:1rem;cursor:pointer;}
.btn-main.active{background:var(--gr);color:#0d1b2a;}
.btn-sub{background:#334155; color:white; border:none; padding:10px; border-radius:8px; font-weight:700; width:100%; margin-top:10px; cursor:pointer;}

.upload-section{background:var(--card2); border:2px dashed var(--bl); border-radius:var(--r); padding:20px; text-align:center; margin-bottom:20px; cursor:pointer;}

.stop-card{background:var(--card2);border-radius:var(--r);padding:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.05);position:relative;}
.stop-card.active{border:2px solid var(--ye);background:rgba(255,209,102,0.1);}
.stop-name{font-weight:900;font-size:1.1rem;color:var(--ye);margin-bottom:6px;}
.child-list{font-size:0.9rem;color:#cbd5e1;line-height:1.4;margin-bottom:8px;}

.edit-panel{background:rgba(0,0,0,0.4); padding:15px; border-radius:12px; margin-top:10px; display:none; border:1px solid var(--bl);}
.edit-panel label{display:block; font-size:0.75rem; color:var(--ye); margin-bottom:4px; margin-top:8px;}
.edit-panel input, .edit-panel textarea{width:100%; background:#0d1b2a; border:1px solid #475569; color:white; padding:10px; border-radius:8px; font-size:0.85rem;}
.edit-panel textarea{height:60px; resize: none;}

.btn-group{display:flex; gap:8px; margin-top:15px;}
.btn-save{flex:2; background:var(--gr); color:#0d1b2a; border:none; padding:12px; border-radius:8px; font-weight:bold;}
.btn-del{flex:1; background:#ef4444; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold;}

nav{position:fixed;bottom:0;width:100%;max-width:500px;left:50%;transform:translateX(-50%);background:var(--card);display:flex;border-top:1px solid rgba(255,255,255,0.1);z-index:100;}
nav button{flex:1;background:none;border:none;padding:15px;color:rgba(255,255,255,0.5);font-weight:700;font-size:0.9rem;}
nav button.active{color:var(--ye);}

.input-group{margin-bottom:15px;}
.input-group label{display:block;font-size:0.8rem;color:var(--ye);margin-bottom:5px;}
.input-group input, .input-group select{width:100%;background:#0d1b2a;border:1px solid #334155;padding:10px;border-radius:8px;color:white;}
</style>
</head>
<body>

<header><h1>🚌 승하차 도우미</h1></header>

<div class="container" id="main-view">
    <div class="info-card">
        <div class="info-row">
            <div>
                <div id="disp-day" class="day-badge">-</div>
                <div id="disp-mode" style="margin-top:5px; font-weight:700; color:var(--ye);">데이터 대기 중</div>
            </div>
            <button id="track-btn" onclick="toggleTracking()" class="btn-main">운행 시작</button>
        </div>
        <div id="gps-status" style="margin-top:10px; font-size:0.75rem; color:rgba(255,255,255,0.5);">GPS 대기 중...</div>
    </div>
    <div id="station-list"></div>
    <button onclick="addNewStop()" class="btn-sub" style="background:var(--bl); margin-top:20px; padding:15px;">➕ 새 정류장 직접 추가</button>
</div>

<div class="container" id="config-view" style="display:none;">
    <div class="upload-section" onclick="document.getElementById('csv-file').click()">
        <span style="font-size:1.5rem;">📁 CSV 파일 업로드</span>
        <p style="font-size:0.8rem; color:var(--bl); margin-top:5px;">기존 데이터를 덮어씁니다.</p>
        <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="handleFile(event)">
    </div>

    <div style="background:var(--card); padding:15px; border-radius:12px;">
        <h3 style="margin-bottom:15px; font-size:1rem; color:var(--ye);">📢 시스템 설정</h3>
        <div class="input-group">
            <label>🗣️ 성우 선택</label>
            <select id="voice-select"></select>
        </div>
        <div class="input-group">
            <label>📍 인식 반경 (미터)</label>
            <input type="number" id="cfg-radius" value="80">
        </div>
        <button onclick="saveConfig()" class="btn-main" style="width:100%; border-radius:10px;">설정 저장</button>
        <button onclick="resetAnnounceLog()" class="btn-sub">🔄 오늘 안내 기록 초기화</button>
        <button onclick="clearAllData()" class="btn-sub" style="background:#475569;">⚠️ 모든 데이터 삭제</button>
    </div>
</div>

<nav>
    <button onclick="showTab('main')" id="tab-main" class="active">🏠 정류장 목록</button>
    <button onclick="showTab('config')" id="tab-config">⚙️ 설정/업로드</button>
</nav>

<script>
let stations = [];
let config = { radius: 80, voiceName: "" };
let isTracking = false;
let watchId = null;
let announcedLog = {}; 
let isSpeaking = false; 
const synth = window.speechSynthesis;

function init() {
    const saved = localStorage.getItem('bus_stations_csv');
    if(saved) {
        stations = JSON.parse(saved);
    }
    const savedCfg = localStorage.getItem('bus_config_v4');
    if(savedCfg) config = {...config, ...JSON.parse(savedCfg)};
    
    document.getElementById('cfg-radius').value = config.radius;
    renderMain();
    loadVoices();
    updateInfo();
}

function loadVoices() {
    let voices = synth.getVoices().filter(v => v.lang.includes('ko'));
    const vs = document.getElementById('voice-select');
    vs.innerHTML = '';
    voices.forEach(v => {
        const opt = document.createElement('option');
        opt.textContent = v.name;
        opt.value = v.name;
        if(v.name === config.voiceName) opt.selected = true;
        vs.appendChild(opt);
    });
}

function handleFile(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(event) { parseCSV(event.target.result); };
    reader.readAsText(file, "EUC-KR"); 
}

function parseCSV(text) {
    try {
        const rows = [];
        const lines = text.split(/\r?\n/);
        for(let i=1; i<lines.length; i++) {
            let line = lines[i].trim();
            if(!line) continue;
            const cols = [];
            let current = '';
            let inQuotes = false;
            for(let j=0; j<line.length; j++) {
                const char = line[j];
                if(char === '"') inQuotes = !inQuotes;
                else if(char === ',' && !inQuotes) { cols.push(current.trim()); current = ''; }
                else current += char;
            }
            cols.push(current.trim());
            if(cols.length >= 3) {
                rows.push({
                    name: cols[0], lat: parseFloat(cols[1]), lng: parseFloat(cols[2]),
                    morning: cols[3] || "", mon: cols[4] || "", tue: cols[5] || "", 
                    wed: cols[6] || "", thu: cols[7] || "", fri: cols[8] || ""
                });
            }
        }
        if(rows.length > 0) {
            stations = rows;
            saveStations();
            alert("성공적으로 불러왔습니다.");
            renderMain(); showTab('main');
        }
    } catch(err) { alert("CSV 파싱 오류"); }
}

function saveStations() {
    localStorage.setItem('bus_stations_csv', JSON.stringify(stations));
}

function renderMain() {
    const list = document.getElementById('station-list');
    list.innerHTML = '';
    const isMorning = new Date().getHours() < 12;
    
    if(stations.length === 0) {
        list.innerHTML = '<div style="text-align:center; padding:40px; color:#64748b;">등록된 정류장이 없습니다.</div>';
        return;
    }

    stations.forEach((s, i) => {
        const names = getNames(s);
        const card = document.createElement('div');
        card.id = `card-${i}`;
        card.className = 'stop-card';
        card.innerHTML = `
            <div class="stop-name">${s.name}</div>
            <div class="child-list">
                <span style="color:var(--bl); font-weight:700;">${isMorning ? '⬆️ 승차' : '⬇️ 하차'}:</span> 
                ${names || '대상자 없음'}
            </div>
            <div style="font-size:0.7rem; color:#94a3b8;">📍 ${s.lat.toFixed(6)}, ${s.lng.toFixed(6)}</div>
            
            <button onclick="toggleEdit(${i})" style="margin-top:10px; color:var(--ye); background:none; border:none; text-decoration:underline; font-size:0.8rem; cursor:pointer;">상세 정보 수정/삭제</button>

            <div id="edit-${i}" class="edit-panel">
                <label>정류장 이름</label>
                <input type="text" id="en-${i}" value="${s.name}">
                
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;"><label>위도</label><input type="number" id="elat-${i}" step="0.000001" value="${s.lat}"></div>
                    <div style="flex:1;"><label>경도</label><input type="number" id="elng-${i}" step="0.000001" value="${s.lng}"></div>
                </div>

                <label>오전 승차자 (매일)</label>
                <textarea id="emorn-${i}">${s.morning}</textarea>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <div><label>월 하차</label><input id="emon-${i}" value="${s.mon}"></div>
                    <div><label>화 하차</label><input id="etue-${i}" value="${s.tue}"></div>
                    <div><label>수 하차</label><input id="ewed-${i}" value="${s.wed}"></div>
                    <div><label>목 하차</label><input id="ethu-${i}" value="${s.thu}"></div>
                    <div style="grid-column: span 2;"><label>금 하차</label><input id="efri-${i}" value="${s.fri}"></div>
                </div>

                <div class="btn-group">
                    <button class="btn-save" onclick="updateStation(${i})">변경사항 저장</button>
                    <button class="btn-del" onclick="deleteStation(${i})">삭제</button>
                </div>
            </div>
            <button onclick="manualSpeak(${i})" style="position:absolute; right:15px; top:15px; background:none; border:none; font-size:1.3rem;">🔊</button>
        `;
        list.appendChild(card);
    });
}

function toggleEdit(i) {
    const p = document.getElementById(`edit-${i}`);
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function updateStation(i) {
    stations[i] = {
        name: document.getElementById(`en-${i}`).value,
        lat: parseFloat(document.getElementById(`elat-${i}`).value),
        lng: parseFloat(document.getElementById(`elng-${i}`).value),
        morning: document.getElementById(`emorn-${i}`).value,
        mon: document.getElementById(`emon-${i}`).value,
        tue: document.getElementById(`etue-${i}`).value,
        wed: document.getElementById(`ewed-${i}`).value,
        thu: document.getElementById(`ethu-${i}`).value,
        fri: document.getElementById(`efri-${i}`).value
    };
    saveStations();
    alert("수정되었습니다.");
    renderMain();
}

function deleteStation(i) {
    if(confirm("정말로 이 정류장을 삭제하시겠습니까?")) {
        stations.splice(i, 1);
        saveStations();
        renderMain();
    }
}

function addNewStop() {
    stations.push({
        name: "새 정류장", lat: 37.0, lng: 127.0,
        morning: "", mon: "", tue: "", wed: "", thu: "", fri: ""
    });
    renderMain();
    toggleEdit(stations.length - 1);
    document.getElementById(`edit-${stations.length-1}`).scrollIntoView({behavior:'smooth'});
}

function getNames(s) {
    const now = new Date();
    if(now.getHours() < 12) return s.morning;
    const day = now.getDay();
    const map = ["", s.mon, s.tue, s.wed, s.thu, s.fri, ""];
    return map[day] || "";
}

function speak(idx, isRepeat = false) {
    const now = Date.now();
    const s = stations[idx];
    if (isSpeaking && !isRepeat) return; 
    if (!isRepeat) {
        const lastTime = announcedLog[s.name] || 0;
        if ((now - lastTime) < 7200000) return; 
        announcedLog[s.name] = now;
    }
    const names = getNames(s);
    let txt = `이번 정류장은 ${s.name} 입니다. `;
    if(names) txt += `${new Date().getHours()<12?'승차할':'하차할'} 어린이는 ${names} 입니다.`;
    isSpeaking = true;
    const ut = new SpeechSynthesisUtterance(txt);
    ut.lang = 'ko-KR';
    const v = synth.getVoices().find(v => v.name === config.voiceName);
    if(v) ut.voice = v;
    ut.onend = function() {
        if (!isRepeat) setTimeout(() => speak(idx, true), 1200);
        else isSpeaking = false;
    };
    ut.onerror = function() { isSpeaking = false; };
    if(!isRepeat) synth.cancel();
    synth.speak(ut);
}

function manualSpeak(i) { 
    isSpeaking = false; 
    const s = stations[i];
    delete announcedLog[s.name]; 
    highlight(i); 
    speak(i); 
}

function resetAnnounceLog() {
    announcedLog = {};
    alert("안내 기록이 초기화되었습니다.");
}

function clearAllData() {
    if(confirm("모든 정류장 데이터가 삭제됩니다. 계속하시겠습니까?")) {
        stations = [];
        saveStations();
        renderMain();
    }
}

function toggleTracking() {
    const btn = document.getElementById('track-btn');
    if(!isTracking) {
        if(stations.length === 0) { alert("먼저 정류장 데이터를 등록해주세요."); return; }
        isTracking = true; btn.innerText = "중지"; btn.classList.add('active');
        watchId = navigator.geolocation.watchPosition(checkPos, (err) => {
            document.getElementById('gps-status').innerText = "GPS 오류: " + err.message;
        }, {enableHighAccuracy:true});
    } else {
        isTracking = false; btn.innerText = "운행 시작"; btn.classList.remove('active');
        navigator.geolocation.clearWatch(watchId);
    }
}

function checkPos(pos) {
    const uLat = pos.coords.latitude;
    const uLng = pos.coords.longitude;
    const radius = parseInt(document.getElementById('cfg-radius').value) || 80;
    document.getElementById('gps-status').innerText = `수신 중 (오차: ${Math.round(pos.coords.accuracy)}m)`;
    stations.forEach((s, i) => {
        const dist = getDist(uLat, uLng, s.lat, s.lng);
        if(dist < radius) { highlight(i); speak(i); }
    });
}

function highlight(idx) {
    document.querySelectorAll('.stop-card').forEach(c => c.classList.remove('active'));
    const target = document.getElementById(`card-${idx}`);
    if(target) { target.classList.add('active'); target.scrollIntoView({behavior:'smooth', block:'center'}); }
}

function getDist(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
    const dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function saveConfig() {
    config.radius = parseInt(document.getElementById('cfg-radius').value) || 80;
    config.voiceName = document.getElementById('voice-select').value;
    localStorage.setItem('bus_config_v4', JSON.stringify(config));
    alert("설정이 저장되었습니다.");
}

function showTab(tab) {
    document.getElementById('main-view').style.display = tab === 'main' ? 'block' : 'none';
    document.getElementById('config-view').style.display = tab === 'config' ? 'block' : 'none';
    document.getElementById('tab-main').className = tab === 'main' ? 'active' : '';
    document.getElementById('tab-config').className = tab === 'config' ? 'active' : '';
}

function updateInfo() {
    const days = ['일','월','화','수','목','금','토'];
    const now = new Date();
    document.getElementById('disp-day').innerText = days[now.getDay()] + "요일";
    document.getElementById('disp-mode').innerText = now.getHours() < 12 ? "☀️ 오전 승차 모드" : "🌙 오후 하차 모드";
}

window.onload = init;
if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = loadVoices; }
</script>
</body>
</html>
